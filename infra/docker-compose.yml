services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: delivrix-postgres
    environment:
      POSTGRES_DB: delivrix_mailops
      POSTGRES_USER: delivrix
      POSTGRES_PASSWORD: delivrix_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivrix -d delivrix_mailops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: delivrix-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
