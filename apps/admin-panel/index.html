<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0e10" media="(prefers-color-scheme: dark)" />
    <title>Delivrix Admin</title>

    <!-- Rebrand B/W (2026-05-28): Montserrat (sans/body/heading principal),
         JetBrains Mono (código/datos/audit). Caveat (manuscrita decorativa)
         eliminada el 2026-05-28; HumanNote usa Montserrat italic.
         Fuentes empaquetadas offline via @fontsource en src/main.tsx
         (2026-07-13) — se quitó la carga por Google Fonts para funcionar
         sin red y bajo CSP estricta. -->
    <script>
      // Tema inicial (pre-paint, sin FOUC): prioridad 1) elección guardada del
      // usuario en localStorage; 2) ajuste del DISPOSITIVO (prefers-color-scheme);
      // 3) fallback oscuro (superficie de ops). Corre antes de React.
      (function applyInitialTheme() {
        try {
          var stored = window.localStorage.getItem("delivrix-admin-theme");
          var theme;
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            theme = "light";
          } else {
            theme = "dark";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
